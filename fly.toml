# fly.toml — Fly.io 部署配置
# 文档：https://fly.io/docs/reference/configuration/

app = "zhangxuefeng-agent"
primary_region = "hkg"

[build]

[env]
  # 非敏感环境变量
  APP_NAME = "张雪峰 AI 咨询 Agent"
  MODEL = "gpt-4o-mini"
  SKILL_PATH = "/app/SKILL.md"
  # REDIS_URL 通过 fly secrets 设置

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
